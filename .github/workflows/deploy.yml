name: Deploy to Hugging Face

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Deploy to Hugging Face
        run: |
          git remote add hf https://huggingface.co/spaces/ShetyeRupa/DocIntel
          git push hf main --force